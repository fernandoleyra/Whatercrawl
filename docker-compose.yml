version: "3.9"

services:
  watercrawl:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
      - WATERCRAWL_DB_PATH=/app/data/watercrawl.db
      - MAX_CONCURRENT_CRAWLS=${MAX_CONCURRENT_CRAWLS:-5}
      - DEFAULT_TIMEOUT=${DEFAULT_TIMEOUT:-30}
      - DEFAULT_MAX_PAGES=${DEFAULT_MAX_PAGES:-100}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - watercrawl_data:/app/data
      - watercrawl_memory:/app/memory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  watercrawl_data:
  watercrawl_memory:
